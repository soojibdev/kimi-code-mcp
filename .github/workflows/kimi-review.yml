name: Kimi Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: howardpen9/kimi-code-reviewer@v1
        with:
          kimi_api_key: ${{ secrets.MOONSHOT_API_KEY }}
          language: zh-TW
          fail_on: never
